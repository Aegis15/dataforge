version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "uv"
    directory: "/dataforge-mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "uv"
    directory: "/docs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "uv"
    directory: "/playground/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/playground/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
