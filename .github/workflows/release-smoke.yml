name: Release smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheel-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install release gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Canonical dataforge15 release gate
        run: python -m dataforge.release.gate --json

      - name: Build MCP smoke wheels
        run: |
          python -m build --wheel --outdir dist
          python -m build dataforge-mcp --wheel --outdir dist

      - name: Installed MCP stdio smoke
        run: |
          python -m venv .release-smoke
          timeout 60 .release-smoke/bin/python -m pip install --find-links dist dataforge15-mcp
          .release-smoke/bin/python - <<'PY'
          import asyncio
          import json
          import os
          import sys
          from pathlib import Path

          from mcp import ClientSession, StdioServerParameters
          from mcp.client.stdio import stdio_client

          workspace = Path("/tmp/dataforge-mcp-smoke")
          workspace.mkdir(parents=True, exist_ok=True)
          csv_path = workspace / "amounts.csv"
          csv_path.write_text(
              "id,amount\n1,100\n2,105\n3,98\n4,1020\n5,103\n",
              encoding="utf-8",
          )
          env = os.environ.copy()
          env["DATAFORGE_MCP_ALLOWED_ROOTS"] = str(workspace)
          command = str(Path(sys.executable).with_name("dataforge15-mcp"))

          async def main() -> None:
              params = StdioServerParameters(command=command, args=["serve"], env=env)
              async with (
                  stdio_client(params) as (read_stream, write_stream),
                  ClientSession(read_stream, write_stream) as session,
              ):
                  await session.initialize()
                  tools = await session.list_tools()
                  assert tools.tools
                  assert all(tool.outputSchema for tool in tools.tools)
                  result = await session.call_tool("dataforge_profile", {"path": str(csv_path)})
                  assert result.isError is False
                  payload = result.structuredContent
                  if "result" in payload:
                      payload = payload["result"]
                  assert json.dumps(payload)
                  assert payload["rows"] == 5
                  assert payload["total_issues"] >= 1

          asyncio.run(main())
          PY
