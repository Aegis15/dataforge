name: Publish dataforge15 to TestPyPI

on:
  push:
    tags:
      - "v*-rc*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Require release-candidate version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if "rc" not in version:
              raise SystemExit(f"TestPyPI rehearsal requires an rc version, found {version!r}.")
          PY

      - name: Canonical release gate
        run: python -m dataforge.release.gate --json

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  testpypi-smoke:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from TestPyPI outside source checkout
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              dataforge15==0.1.0rc1 && break
            if [ "$attempt" = "5" ]; then
              exit 1
            fi
            sleep 30
          done

      - name: Smoke installed TestPyPI artifact
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          dataforge15 --version
          cat > fd.csv <<'CSV'
          code,name
          A,Alpha
          A,Alpha
          A,Alfa
          B,Beta
          B,Beta
          C,Gamma
          C,Gamma
          D,Delta
          D,Delta
          E,Echo
          CSV
          dataforge15 profile fd.csv --constraints-out constraints.json --json
          fd_id="$(python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("constraints.json").read_text(encoding="utf-8"))
          for reviewed in payload["candidates"]:
              candidate = reviewed["candidate"]
              if (
                  candidate["kind"] == "functional_dependency"
                  and candidate["columns"] == ["code"]
                  and candidate["dependent"] == "name"
              ):
                  print(reviewed["candidate_id"])
                  break
          else:
              raise SystemExit("No code -> name FD candidate found.")
          PY
          )"
          dataforge15 constraints review constraints.json --accept "$fd_id" --no-tui --json
          dataforge15 repair fd.csv --constraints constraints.json --dry-run --json
          dataforge15 release doctor --core --json
