name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build MkDocs site
        run: mkdocs build -f docs/mkdocs.yml --strict

      - name: Skip Cloudflare deploy when secrets are unavailable
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          (env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '')
        run: |
          echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured for this repository."

      - name: Deploy to Cloudflare Pages
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          env.CLOUDFLARE_API_TOKEN != '' &&
          env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/site --project-name=dataforge-docs --branch=main
