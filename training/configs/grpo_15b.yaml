schema_version: grpo_15b_v1

environment:
  resolved_on: "2026-05-16"
  runtime_target: "Kaggle free GPU P100/T4 or Colab free GPU, QLoRA fp16"
  notes:
    - "Set PYTHONUTF8=1 before importing TRL on Windows-style runtimes."
    - "TRL v0.11 is intentionally unsupported because GRPOTrainer is not part of that release path."
  pip_packages:
    - "trl==1.4.0"
    - "transformers==5.7.0"
    - "accelerate==1.13.0"
    - "peft==0.19.1"
    - "bitsandbytes==0.49.2"
    - "datasets==4.8.5"
    - "huggingface_hub==1.13.0"
    - "pyyaml==6.0.3"
    - "pandas==2.3.3"
    - "tensorboard==2.20.0"

repos:
  dataset_repo_template: "{hf_user}/dataforge-sft-trajectories"
  source_dataset_repo: "Praneshrajan15/dataforge-sft-trajectories"
  sft_model_repo: "Praneshrajan15/DataForge-1.5B-SFT"
  grpo_model_repo_template: "{hf_user}/DataForge-1.5B-GRPO"
  config_filename: grpo_15b.yaml
  reward_module: training/rewards/dataforge_reward.py

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  sft_checkpoint: "Praneshrajan15/DataForge-1.5B-SFT"
  sft_checkpoint_required: true
  target_model_repo: "Praneshrajan15/DataForge-1.5B-GRPO"
  model_license: "apache-2.0"
  trust_remote_code: true
  torch_dtype: "float16"

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "float16"

training:
  output_dir: "/kaggle/working/dataforge-1.5b-grpo"
  adapter_dir: "/kaggle/working/dataforge-1.5b-grpo-adapter"
  merged_dir: "/kaggle/working/DataForge-1.5B-GRPO-merged"
  max_steps: 500
  num_generations: 4
  max_completion_length: 256
  prompt_token_budget: 1024
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  beta: 0.04
  learning_rate: 0.00001
  num_iterations: 1
  save_steps: 50
  logging_steps: 5
  report_to: "tensorboard"
  save_total_limit: 4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.0
  fp16: true
  bf16: false
  gradient_checkpointing: true
  use_cache: false

reward:
  function: "training.rewards.dataforge_reward:dataforge_reward"
  prompt_contract_version: "repair_contract_v1"
  local_stateless: true
  endpoint_healthcheck_only: true
  parse_failure_reward: 0.0
  clean_finish_reward: 1.0

release:
  benchmark_name: "DataForge-Bench-light-verified"
  benchmark_seeds:
    - 0
    - 1
    - 2
  min_absolute_f1_gain: 0.03
  require_parse_success_rate: 0.99
  require_schema_case_error_count: 0
  require_eval_diagnostics: true
  push_only_if_gate_passes: true
  attempted_steps_target: 500
  compute_cost_unit: "gpu_hours"

documented_not_attempted:
  models_3b_plus:
    reason: "Requires paid compute or an HF compute grant; not attempted on Week 12 free-tier path."
    reproducibility_note: "Reuse this config shape with larger hardware, lower generation batch sizes, and a verified SFT warmup checkpoint."
