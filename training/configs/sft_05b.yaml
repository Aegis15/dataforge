schema_version: sft_05b_v1

environment:
  resolved_on: "2026-05-02"
  runtime_target: "Kaggle free GPU, single P100 16GB, fp16"
  pip_packages:
    - "trl==1.3.0"
    - "transformers==5.7.0"
    - "accelerate==1.13.0"
    - "peft==0.19.1"
    - "bitsandbytes==0.49.2"
    - "datasets==4.8.5"
    - "huggingface_hub==1.13.0"
    - "pyyaml==6.0.3"
    - "pandas==2.3.3"

repos:
  dataset_repo_template: "{hf_user}/dataforge-sft-trajectories"
  model_repo_template: "{hf_user}/DataForge-0.5B-SFT"
  trajectory_filename: expert_v1.jsonl
  config_filename: sft_05b.yaml
  model_card_template_filename: MODEL_CARD_TEMPLATE.md

model:
  base_model: "Qwen/Qwen2.5-0.5B-Instruct"
  model_license: "apache-2.0"
  trust_remote_code: true
  torch_dtype: "float16"
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_use_double_quant: true
    bnb_4bit_compute_dtype: "float16"

lora:
  r: 16
  alpha: 16
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

training:
  output_dir: "/kaggle/working/dataforge-0.5b-sft"
  adapter_dir: "/kaggle/working/dataforge-0.5b-sft-adapter"
  merged_dir: "/kaggle/working/DataForge-0.5B-SFT-merged"
  num_train_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.00002
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_seq_length: 2048
  packing: false
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  fp16: true
  bf16: false
  gradient_checkpointing: true
  report_to: "none"

collection:
  schema_version: "expert_v1"
  max_trajectories: 2000
  min_episode_f1: 0.6
  max_total_requests: 2800
  daily_request_budget: 900
  teacher_provider: "groq"
  teacher_model: "llama-3.3-70b-versatile"
  datasets:
    - "hospital"
    - "flights"
    - "beers"
  difficulties:
    - "easy"
    - "medium"

evaluation:
  heldout_tasks: 100
  seeds_start: 10000
  max_new_tokens: 384
  temperature: 0.0
  datasets:
    - "hospital"
    - "flights"
    - "beers"

data_sources:
  hospital:
    dirty_url: "https://raw.githubusercontent.com/BigDaMa/raha/refs/heads/master/datasets/hospital/dirty.csv"
    clean_url: "https://raw.githubusercontent.com/BigDaMa/raha/refs/heads/master/datasets/hospital/clean.csv"
    citation: "Mahdavi et al. Raha benchmark dataset (Hospital) via the BigDaMa/raha repository."
  flights:
    dirty_url: "https://raw.githubusercontent.com/BigDaMa/raha/refs/heads/master/datasets/flights/dirty.csv"
    clean_url: "https://raw.githubusercontent.com/BigDaMa/raha/refs/heads/master/datasets/flights/clean.csv"
    citation: "Mahdavi et al. Raha benchmark dataset (Flights) via the BigDaMa/raha repository."
  beers:
    dirty_url: "https://raw.githubusercontent.com/BigDaMa/raha/refs/heads/master/datasets/beers/dirty.csv"
    clean_url: "https://raw.githubusercontent.com/BigDaMa/raha/refs/heads/master/datasets/beers/clean.csv"
    citation: "Mahdavi et al. Raha benchmark dataset (Beers) via the BigDaMa/raha repository."
