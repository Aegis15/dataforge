name = "dataforge"
main = "./playground/web/worker.js"
compatibility_date = "2026-04-27"
routes = [
  { pattern = "dataforge.dev/playground*", zone_name = "dataforge.dev" },
]

[build]
command = "npm --prefix playground/web install && npm --prefix playground/web run build"

[assets]
directory = "./playground/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
