site_name: DataForge
site_description: CLI-first data-quality detection and reversible repair for tabular data.
site_url: https://dataforge-docs.pages.dev/
repo_url: https://github.com/Praneshrajan15/data_quality_env
edit_uri: edit/main/docs/docs/

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Playground: playground.md
  - Concepts:
      - Agent Loop: concepts/agent-loop.md
      - Safety: concepts/safety.md
      - SMT Verification: concepts/smt-verification.md
      - Causal Root Cause: concepts/causal-root-cause.md
      - Transactions: concepts/transactions.md
  - Detectors: detectors.md
  - Safety: safety.md
  - Architecture: architecture.md
  - Reference: reference.md
  - RFCs:
      - Overview: rfcs/index.md
      - RFC-001 Streaming Support: rfcs/RFC-001-streaming-support.md
      - RFC-002 PII Detection Expansion: rfcs/RFC-002-pii-detection-expansion.md
      - RFC-003 API Versioning: rfcs/RFC-003-api-versioning.md
  - Changelog: changelog.md
